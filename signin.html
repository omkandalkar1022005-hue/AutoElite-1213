<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoElite | Sign In & Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background elements */
    .bg-circle {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, rgba(56,189,248,0) 70%);
      pointer-events: none;
      animation: float 20s infinite ease-in-out;
    }

    .circle-1 { width: 500px; height: 500px; top: -250px; right: -100px; animation-delay: 0s; }
    .circle-2 { width: 400px; height: 400px; bottom: -150px; left: -150px; animation-delay: -5s; }
    .circle-3 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; opacity: 0.3; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1200px;
      padding: 20px;
      margin: 40px auto;
    }

    /* Card wrapper */
    .auth-card {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      border: 1px solid rgba(56, 189, 248, 0.2);
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease;
    }

    .auth-card:hover {
      transform: translateY(-5px);
    }

    /* Two column layout */
    .auth-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 650px;
    }

    /* Left side - Branding */
    .brand-side {
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(129, 140, 248, 0.1));
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .brand-side::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .brand-content {
      position: relative;
      z-index: 2;
    }

    .logo-icon {
      font-size: 60px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 30px;
    }

    .brand-side h2 {
      font-size: 2.5rem;
      font-weight: 800;
      color: white;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .brand-side h2 span {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand-side p {
      color: #94a3b8;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .features-list {
      list-style: none;
      margin-top: 30px;
    }

    .features-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      color: #cbd5e6;
      font-size: 0.95rem;
    }

    .features-list li i {
      width: 30px;
      height: 30px;
      background: rgba(56, 189, 248, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #38bdf8;
    }

    /* Right side - Forms */
    .form-side {
      padding: 50px 40px;
      background: rgba(2, 6, 23, 0.6);
    }

    .form-tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      border-bottom: 2px solid rgba(56, 189, 248, 0.2);
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 12px 0;
      font-size: 1.2rem;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .tab-btn.active {
      color: #38bdf8;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: #38bdf8;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { width: 0; }
      to { width: 100%; }
    }

    .form-panel {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .form-panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-group {
      margin-bottom: 25px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px 14px 45px;
      background: rgba(30, 41, 59, 0.8);
      border: 1.5px solid rgba(56, 189, 248, 0.2);
      border-radius: 24px;
      color: white;
      font-size: 1rem;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .input-group input:focus {
      outline: none;
      border-color: #38bdf8;
      background: rgba(30, 41, 59, 1);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
    }

    .input-group i {
      position: absolute;
      left: 16px;
      bottom: 16px;
      color: #64748b;
      font-size: 1.1rem;
      transition: color 0.3s;
    }

    .input-group input:focus + i {
      color: #38bdf8;
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      bottom: 16px;
      cursor: pointer;
      color: #64748b;
      transition: color 0.3s;
    }

    .password-toggle:hover {
      color: #38bdf8;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .remember-me input {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #38bdf8;
    }

    .forgot-link {
      color: #38bdf8;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.3s;
    }

    .forgot-link:hover {
      color: #818cf8;
      text-decoration: underline;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 40px;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .submit-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(56, 189, 248, 0.4);
    }

    .social-login {
      text-align: center;
      margin-top: 30px;
    }

    .social-login p {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 15px;
      position: relative;
    }

    .social-login p::before,
    .social-login p::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: rgba(56, 189, 248, 0.2);
    }

    .social-login p::before {
      left: 0;
    }

    .social-login p::after {
      right: 0;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .social-icon {
      width: 45px;
      height: 45px;
      background: rgba(30, 41, 59, 0.8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      text-decoration: none;
      transition: all 0.3s;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .social-icon:hover {
      transform: translateY(-3px);
      color: #38bdf8;
      border-color: #38bdf8;
      background: rgba(56, 189, 248, 0.1);
    }

    .message-toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #0f172a;
      border-left: 4px solid #38bdf8;
      padding: 12px 20px;
      border-radius: 12px;
      color: white;
      z-index: 1000;
      animation: slideInRight 0.3s ease;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .auth-wrapper {
        grid-template-columns: 1fr;
      }

      .brand-side {
        padding: 40px 30px;
        text-align: center;
      }

      .features-list li {
        justify-content: center;
      }

      .form-side {
        padding: 40px 30px;
      }

      .brand-side h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<div class="bg-circle circle-1"></div>
<div class="bg-circle circle-2"></div>
<div class="bg-circle circle-3"></div>

<div class="container">
  <div class="auth-card">
    <div class="auth-wrapper">
      <!-- Left Branding Section -->
      <div class="brand-side">
        <div class="brand-content">
          <div class="logo-icon">
            <i class="fas fa-car-side"></i>
          </div>
          <h2>Welcome to <span>AutoElite</span></h2>
          <p>India's most trusted vehicle marketplace. Find your dream car, bike, or heavy machinery with ease.</p>
          <ul class="features-list">
            <li><i class="fas fa-check-circle"></i> 10,000+ Verified Vehicles</li>
            <li><i class="fas fa-shield-alt"></i> 100% Secure Transactions</li>
            <li><i class="fas fa-headset"></i> 24/7 Customer Support</li>
            <li><i class="fas fa-truck"></i> Pan India Delivery</li>
          </ul>
        </div>
      </div>

      <!-- Right Forms Section -->
      <div class="form-side">
        <div class="form-tabs">
          <button class="tab-btn active" data-tab="signin">🔐 Sign In</button>
          <button class="tab-btn" data-tab="signup">✨ Create Account</button>
        </div>

        <!-- Sign In Form -->
        <div class="form-panel active" id="signin-form">
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
              <label>Email Address</label>
              <input type="email" id="loginEmail" placeholder="Enter your email" required>
              <i class="fas fa-envelope"></i>
            </div>
            <div class="input-group">
              <label>Password</label>
              <input type="password" id="loginPassword" placeholder="Enter your password" required>
              <i class="fas fa-lock"></i>
              <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
            </div>
            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" id="rememberMe"> Remember me
              </label>
              <a href="#" class="forgot-link" onclick="showForgotPassword(event)">Forgot Password?</a>
            </div>
            <button type="submit" class="submit-btn">Sign In <i class="fas fa-arrow-right"></i></button>
          </form>
          <div class="social-login">
            <p>Or continue with</p>
            <div class="social-icons">
              <a href="#" class="social-icon" onclick="socialLogin('google', event)"><i class="fab fa-google"></i></a>
              <a href="#" class="social-icon" onclick="socialLogin('facebook', event)"><i class="fab fa-facebook-f"></i></a>
              <a href="#" class="social-icon" onclick="socialLogin('apple', event)"><i class="fab fa-apple"></i></a>
            </div>
          </div>
        </div>

        <!-- Sign Up Form -->
        <div class="form-panel" id="signup-form">
          <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="input-group">
              <label>Full Name</label>
              <input type="text" id="regName" placeholder="Enter your full name" required>
              <i class="fas fa-user"></i>
            </div>
            <div class="input-group">
              <label>Email Address</label>
              <input type="email" id="regEmail" placeholder="Enter your email" required>
              <i class="fas fa-envelope"></i>
            </div>
            <div class="input-group">
              <label>Phone Number</label>
              <input type="tel" id="regPhone" placeholder="Enter mobile number" required>
              <i class="fas fa-phone"></i>
            </div>
            <div class="input-group">
              <label>Password</label>
              <input type="password" id="regPassword" placeholder="Create a password" required>
              <i class="fas fa-lock"></i>
              <i class="fas fa-eye password-toggle" onclick="togglePassword('regPassword', this)"></i>
            </div>
            <div class="input-group">
              <label>Confirm Password</label>
              <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
              <i class="fas fa-check-circle"></i>
            </div>
            <button type="submit" class="submit-btn">Create Account <i class="fas fa-user-plus"></i></button>
          </form>
          <div class="social-login">
            <p>Or sign up with</p>
            <div class="social-icons">
              <a href="#" class="social-icon" onclick="socialLogin('google', event)"><i class="fab fa-google"></i></a>
              <a href="#" class="social-icon" onclick="socialLogin('facebook', event)"><i class="fab fa-facebook-f"></i></a>
              <a href="#" class="social-icon" onclick="socialLogin('apple', event)"><i class="fab fa-apple"></i></a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Tab switching functionality
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tabName = btn.dataset.tab;
      
      // Update active tab
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      // Show corresponding form
      document.querySelectorAll('.form-panel').forEach(panel => panel.classList.remove('active'));
      if (tabName === 'signin') {
        document.getElementById('signin-form').classList.add('active');
      } else {
        document.getElementById('signup-form').classList.add('active');
      }
    });
  });

  // Toggle password visibility
  function togglePassword(inputId, element) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      element.classList.remove('fa-eye');
      element.classList.add('fa-eye-slash');
    } else {
      input.type = 'password';
      element.classList.remove('fa-eye-slash');
      element.classList.add('fa-eye');
    }
  }

  // Show toast message
  function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = 'message-toast';
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
    toast.style.borderLeftColor = type === 'success' ? '#38bdf8' : '#ef4444';
    document.body.appendChild(toast);
    
    setTimeout(() => {
      toast.remove();
    }, 3000);
  }

  // Handle Login
  function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const rememberMe = document.getElementById('rememberMe').checked;
    
    // Demo validation - In real app, this would be an API call
    if (email && password) {
      if (email === 'demo@autoelite.com' && password === 'demo123') {
        showToast('🎉 Welcome back! Login successful!', 'success');
        
        if (rememberMe) {
          localStorage.setItem('rememberedUser', email);
        }
        
        // Redirect after 1.5 seconds
        setTimeout(() => {
          window.location.href = '#'; // Replace with your dashboard URL
          showToast('🔄 Redirecting to dashboard...', 'success');
        }, 1500);
      } else {
        showToast('❌ Invalid credentials. Try demo@autoelite.com / demo123', 'error');
      }
    } else {
      showToast('⚠️ Please fill all fields', 'error');
    }
  }

  // Handle Registration
  function handleRegister(event) {
    event.preventDefault();
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const phone = document.getElementById('regPhone').value;
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirmPassword').value;
    
    if (!name || !email || !phone || !password || !confirmPassword) {
      showToast('⚠️ Please fill all fields', 'error');
      return;
    }
    
    if (password !== confirmPassword) {
      showToast('❌ Passwords do not match!', 'error');
      return;
    }
    
    if (password.length < 6) {
      showToast('⚠️ Password must be at least 6 characters', 'error');
      return;
    }
    
    if (!email.includes('@')) {
      showToast('⚠️ Please enter a valid email address', 'error');
      return;
    }
    
    // Simulate successful registration
    showToast('🎉 Account created successfully! Please sign in.', 'success');
    
    // Clear form
    document.getElementById('registerForm').reset();
    
    // Switch to sign in tab after 1 second
    setTimeout(() => {
      document.querySelector('.tab-btn[data-tab="signin"]').click();
      showToast('🔐 Now you can sign in with your credentials', 'success');
    }, 1000);
  }

  // Forgot Password
  function showForgotPassword(event) {
    event.preventDefault();
    const email = prompt('Enter your registered email address to reset password:');
    if (email && email.includes('@')) {
      showToast(`📧 Password reset link sent to ${email}`, 'success');
    } else if (email) {
      showToast('⚠️ Please enter a valid email address', 'error');
    }
  }

  // Social Login Demo
  function socialLogin(platform, event) {
    event.preventDefault();
    showToast(`🔐 Connecting with ${platform}... (Demo)`, 'success');
    setTimeout(() => {
      showToast(`✅ Successfully logged in with ${platform}!`, 'success');
    }, 1000);
  }

  // Check for remembered user on load
  window.addEventListener('load', () => {
    const remembered = localStorage.getItem('rememberedUser');
    if (remembered) {
      document.getElementById('loginEmail').value = remembered;
      document.getElementById('rememberMe').checked = true;
      showToast('👋 Welcome back! Enter your password to continue.', 'success');
    }
  });
</script>

</body>
</html>
